services:
  - type: web
    name: context-server
    runtime: node
    region: singapore
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npx tsx src/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: CONTEXT_TOKEN
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: DMWORK_API_URL
        sync: false
      - key: DMWORK_BOT_TOKEN
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
